<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800" role="img" aria-labelledby="title description">
	<title id="title">Dark Mode Lite mode comparison</title>
	<desc id="description">Smart, invert, and soft mode examples for a dark mode extension.</desc>
