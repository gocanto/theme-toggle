<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="brand.css">
</head>
<body>
<div style="width:1280px;height:800px;position:relative;overflow:hidden;background:#080B10;font-family:'Geist',ui-sans-serif,system-ui,-apple-system,sans-serif;">

  <div style="position:absolute;right:-120px;top:50%;transform:translateY(-50%);width:820px;height:820px;background:radial-gradient(circle at center,rgba(35,213,195,.15),transparent 62%);pointer-events:none;"></div>
  <div style="position:absolute;left:-160px;top:-180px;width:600px;height:600px;background:radial-gradient(circle at center,rgba(70,130,170,.10),transparent 66%);pointer-events:none;"></div>
  <div style="position:absolute;inset:0;background:radial-gradient(125% 120% at 50% 50%,transparent 52%,rgba(0,0,0,.5));pointer-events:none;"></div>

  <div style="position:relative;z-index:1;height:100%;display:flex;align-items:center;">

    <div style="width:610px;padding:0 40px 0 96px;display:flex;flex-direction:column;">
      <div style="display:flex;align-items:center;gap:13px;margin-bottom:40px;">
        <img src="icon.svg" width="46" height="46" style="display:block;border-radius:12px;box-shadow:0 0 18px rgba(35,213,195,.26);" alt="Dark Mode Lite">
        <div style="font-size:19px;font-weight:600;letter-spacing:-.01em;color:#EAEEF4;">Dark Mode Lite</div>
      </div>

      <div style="font-family:'Geist Mono',ui-monospace,monospace;font-size:13px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:#2FE0CE;margin-bottom:16px;">Per-site control</div>
      <div style="font-size:58px;font-weight:700;letter-spacing:-.03em;line-height:1.03;color:#F3F6FA;">On exactly<br>where you <span style="color:#2FE0CE;">want</span>.</div>
      <div style="font-size:20px;line-height:1.5;color:#98A3B2;max-width:470px;margin-top:22px;">Flip Dark Mode Lite on or off per site in one tap. Your choice sticks — it remembers every time you come back.</div>

      <div style="display:flex;align-items:center;gap:14px;margin-top:38px;">
        <div style="display:flex;align-items:center;gap:10px;padding:14px 22px;border-radius:14px;background:linear-gradient(180deg,#2FE6D3,#16BEAD);color:#042420;font-size:17px;font-weight:700;box-shadow:0 12px 30px -8px rgba(35,213,195,.5);">Add to Chrome — Free
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h13M13 6l6 6-6 6"/></svg>
        </div>
        <div style="font-size:14px;color:#6C7686;">No account needed</div>
      </div>
    </div>

    <div style="flex:1;display:flex;align-items:center;justify-content:center;">
      <div style="transform:scale(1.16);transform-origin:center;">
        <div data-dml-popup data-highlight="site"></div>
      </div>
    </div>

  </div>
</div>
<script src="popup-card.js"></script>
</body>
</html>
