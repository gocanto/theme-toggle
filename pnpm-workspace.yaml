packages:
  - apps/*
  - packages/*

# Single source of truth for shared dependency versions across the workspace.
# Packages reference these with "catalog:" instead of pinning their own ranges.
catalog:
  # runtime
  '@fontsource-variable/geist': ^5.2.9
  '@fontsource-variable/geist-mono': ^5.2.8
  '@lucide/vue': ^1.23.0
  class-variance-authority: ^0.7.1
  clsx: ^2.1.1
  reka-ui: ^2.10.1
  tailwind-merge: ^3.6.0
  vue: ^3.5.39
  # tooling
  '@tailwindcss/vite': ^4.3.2
  '@types/chrome': ^0.1.18
  '@types/node': ^24.10.2
  '@vitejs/plugin-vue': ^6.0.7
  '@vitest/coverage-v8': ^4.1.9
  shadcn-vue: ^2.7.4
  tailwindcss: ^4.3.2
  tw-animate-css: ^1.4.0
  typescript: ^5.9.3
  vite-plus: ^0.2.1
  vitepress: ^1.6.4
  vitest: ^4.1.9
  vue-tsc: ^3.3.6

allowBuilds:
  esbuild: true
  vue-demi: true
minimumReleaseAgeExclude:
  - '@lucide/vue@1.23.0'
  - vite@8.1.3
