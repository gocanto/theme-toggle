# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
# CodeRabbit is opt-in: only PRs carrying the `coderabbit` label are auto-reviewed,
# and drafts are skipped even when labeled. Add the label to request a review.
language: en-US
reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  auto_review:
    enabled: true
    drafts: false
    labels:
      - coderabbit
chat:
  auto_reply: true
