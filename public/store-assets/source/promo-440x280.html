<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="brand.css">
</head>
<body>
<div style="width:440px;height:280px;position:relative;overflow:hidden;background:#080B10;font-family:'Geist',ui-sans-serif,system-ui,-apple-system,sans-serif;">

  <div style="position:absolute;right:-90px;top:-70px;width:360px;height:360px;background:radial-gradient(circle at center,rgba(35,213,195,.18),transparent 62%);pointer-events:none;"></div>
  <div style="position:absolute;left:-110px;bottom:-140px;width:340px;height:340px;background:radial-gradient(circle at center,rgba(70,130,170,.12),transparent 66%);pointer-events:none;"></div>
  <div style="position:absolute;inset:0;background:radial-gradient(120% 120% at 40% 40%,transparent 55%,rgba(0,0,0,.5));pointer-events:none;"></div>

  <div style="position:relative;z-index:1;height:100%;display:flex;flex-direction:column;justify-content:center;padding:0 34px;">

    <div style="display:flex;align-items:center;gap:13px;margin-bottom:20px;">
      <img src="icon.svg" width="52" height="52" style="display:block;border-radius:13px;box-shadow:0 0 20px rgba(35,213,195,.3);" alt="Dark Mode Lite">
      <div>
        <div style="font-size:19px;font-weight:600;letter-spacing:-.01em;color:#EAEEF4;line-height:1.1;">Dark Mode Lite</div>
        <div style="font-size:12.5px;color:#7E8998;margin-top:2px;">Chrome extension · gocanto.sh</div>
      </div>
    </div>

    <div style="font-size:34px;font-weight:700;letter-spacing:-.03em;line-height:1.05;color:#F3F6FA;">Dark mode for <span style="color:#2FE0CE;">every site.</span></div>

    <div style="display:flex;flex-wrap:wrap;gap:7px;margin-top:20px;">
      <div style="display:flex;align-items:center;gap:7px;padding:6px 12px;border-radius:999px;background:#12171F;border:1px solid rgba(255,255,255,.08);font-size:12.5px;color:#AEB7C4;font-weight:500;"><span style="width:6px;height:6px;border-radius:50%;background:#2FE0CE;"></span>Smart mode</div>
      <div style="display:flex;align-items:center;gap:7px;padding:6px 12px;border-radius:999px;background:#12171F;border:1px solid rgba(255,255,255,.08);font-size:12.5px;color:#AEB7C4;font-weight:500;"><span style="width:6px;height:6px;border-radius:50%;background:#7C8CF8;"></span>Presets</div>
      <div style="display:flex;align-items:center;gap:7px;padding:6px 12px;border-radius:999px;background:#12171F;border:1px solid rgba(255,255,255,.08);font-size:12.5px;color:#AEB7C4;font-weight:500;"><span style="width:6px;height:6px;border-radius:50%;background:#B084F5;"></span>Per-site control</div>
    </div>

  </div>
</div>
</body>
</html>
